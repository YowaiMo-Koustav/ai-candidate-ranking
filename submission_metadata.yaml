team_name: "NPCsWithWifi"
team_members:
  - "ANSHU RAJ"
  - "KOUSTAV MALLICK"
  - "SOUMYADIP MANDAL"
model_description: >-
  Sentence-Transformers (all-MiniLM-L6-v2) + 15 hand-engineered
  recruiter-domain features with weighted heuristic scoring,
  honeypot detection, and JD-aware reasoning generation.
  Scores all 100k candidates by semantic similarity to the JD
  combined with structured signals (role title fit, product-company
  affinity, experience band match, ML years estimate, AI skill depth,
  availability, reliability, GitHub activity, geo fit, work mode,
  notice period penalty, honeypot risk), then outputs the top 100.
features_used:
  - "semantic_similarity"
  - "role_title_score"
  - "product_company_score"
  - "experience_band_match"
  - "ml_years_estimate"
  - "ai_core_skills_count"
  - "ai_skill_depth_score"
  - "availability_score"
  - "reliability_score"
  - "github_fit_score"
  - "geo_fit_score"
  - "work_mode_fit"
  - "notice_period_penalty"
  - "honeypot_risk_score"
external_data_used: false
