# Methodology Summary (Table 5: optional, ≤200 words)
methodology_summary: >-
  Two-phase pipeline: (1) Offline precomputation — parse 100k JSONL candidates,
  engineer 15 recruiter-domain features (role title fit, product-company affinity,
  experience band match, ML years estimate, AI skill depth, availability,
  reliability, GitHub activity, geo fit, work mode, notice period, honeypot risk),
  and compute 384-dim sentence embeddings using all-MiniLM-L6-v2.
  (2) Fast CPU inference (<20s) — encode JD, compute cosine similarities,
  combine semantic signal (30% weight) with structured features via weighted
  scoring, filter honeypot candidates (risk ≥ 0.6), select top 100,
  generate JD-aware reasoning referencing specific candidate facts.
  No LLM calls, no GPU, no network access. All heuristic weights hand-tuned
  from EDA on candidate distribution patterns.
  Single-command reproduction: python -m src.inference

# Model & Features
model_description: >-
  Sentence-Transformers (all-MiniLM-L6-v2, 22M params) for dense text
  embeddings + 15 hand-engineered recruiter-domain feature functions
  with weighted heuristic scoring fusion
features_used:
  - "semantic_similarity"
  - "role_title_score"
  - "product_company_score"
  - "experience_band_match"
  - "ml_years_estimate"
  - "ai_skill_depth_score"
  - "availability_score"
  - "reliability_score"
  - "github_fit_score"
  - "geo_fit_score"
  - "work_mode_fit"
  - "notice_period_penalty"
  - "honeypot_risk_score"
external_data_used: false
