# ==============================================================================
# AI Candidate Ranking — Central Configuration
# ==============================================================================

# --- Project Info ---
project:
  name: "ai-candidate-ranking"
  version: "1.0.0"

# --- Data Paths ---
paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  sample_data: "data/sample/"
  models: "outputs/models/"
  submissions: "outputs/submissions/"
  reports: "outputs/reports/"

# --- Dataset ---
dataset:
  candidates_file: "candidates.jsonl"          # JSONL, one candidate per line
  job_description_file: "job_description.docx" # Word doc with full JD

# --- Embedding Settings ---
embeddings:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 128
  max_seq_length: 512

# --- Scoring Weights (total positive = 0.88) ---
scoring:
  weights:
    semantic: 0.30        # Cosine similarity of embeddings
    role: 0.10            # Role title fit (ML/AI title match)
    product: 0.08         # Product company affinity
    exp_band: 0.10        # Experience band match (peaks at 6-8 YOE)
    ml_years: 0.10        # ML years estimate from career history
    ai_depth: 0.05        # AI skill depth (proficiency × duration)
    avail: 0.04           # Availability signals
    rel: 0.04             # Reliability signals
    github: 0.03          # GitHub activity score
    geo: 0.02             # Geographic fit
    work_mode: 0.02       # Work mode preference fit

  penalties:
    notice_period_alpha: 0.15   # Notice period penalty scale
    honeypot_risk_beta: 0.30    # Honeypot risk penalty scale

# --- Ranking ---
ranking:
  top_k: 100                   # Number of candidates to shortlist
  honeypot_threshold: 0.6      # Filter out candidates above this honeypot risk

# --- Submission Spec ---
submission:
  columns:
    - "candidate_id"
    - "rank"
    - "score"
    - "reasoning"
  num_rows: 100
